name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Only rebuild the frontend when something that actually affects the build
      # changed. Edge-function-only / docs-only pushes skip it entirely — this
      # avoids the heavy, multi-minute image rebuild (and the outage risk if it
      # fails) on every unrelated push.
      - name: Detect frontend changes
        id: changes
        run: |
          base="${{ github.event.before }}"
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            base=$(git rev-parse HEAD^ 2>/dev/null || echo "")
          fi
          if [ -z "$base" ]; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if git diff --name-only "$base" HEAD \
               | grep -qE '^(src/|public/|index\.html|package\.json|package-lock\.json|Dockerfile|nginx\.conf|\.dockerignore|deploy/|vite\.config|tsconfig|tailwind\.config|postcss\.config|components\.json)'; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Frontend changed: $(tail -1 "$GITHUB_OUTPUT")"

      # Build the frontend image HERE (fast GitHub runner), not on the VPS.
      # The small shared VPS can't reliably finish a Vite build, which twice
      # took the app down. We build, ship the image as a tarball, and the VPS
      # only `docker load`s it + restarts the container — zero build on the VPS.
      # Build the image and PUSH it to GitHub Container Registry. The VPS then
      # pulls it outbound (a small cron runs `compose pull` + `up -d`), which
      # works even though Hostinger blocks inbound connections from cloud
      # (GitHub) IPs. No connection from the runner to the VPS at all.
      - name: Log in to GitHub Container Registry
        if: steps.changes.outputs.frontend == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image to ghcr.io
        if: steps.changes.outputs.frontend == 'true'
        run: |
          docker compose -f deploy/docker-compose.yml build
          docker push ghcr.io/itakecare/leazr-frontend:latest

  deploy-supabase-functions:
    runs-on: ubuntu-latest
    env:
      SUPABASE_PROJECT_REF: cifbetjefyfocafanlhv
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed functions
        id: changes
        run: |
          base="${{ github.event.before }}"
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            base=$(git rev-parse HEAD^ 2>/dev/null || echo "")
          fi

          if [ -z "$base" ]; then
            echo "No base commit, skipping."
            echo "shared_changed=false" >> "$GITHUB_OUTPUT"
            echo "functions=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          shared_changed=false
          if git diff --name-only "$base" HEAD -- 'supabase/functions/_shared/' | grep -q .; then
            shared_changed=true
          fi

          functions=$(git diff --name-only "$base" HEAD -- 'supabase/functions/' \
            | awk -F/ 'NF>=4 && $3 != "_shared" {print $3}' \
            | sort -u)

          echo "shared_changed=$shared_changed" >> "$GITHUB_OUTPUT"
          {
            echo "functions<<FUNCTIONS_EOF"
            echo "$functions"
            echo "FUNCTIONS_EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Changed functions:"
          echo "$functions"
          echo "_shared changed: $shared_changed"

      - name: Warn if _shared changed
        if: steps.changes.outputs.shared_changed == 'true'
        run: |
          echo "::warning::supabase/functions/_shared changed. Only the functions touched in this push will be redeployed automatically. Redeploy other dependents manually if needed."

      - name: Setup Supabase CLI
        if: steps.changes.outputs.functions != ''
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy changed functions
        if: steps.changes.outputs.functions != ''
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          while IFS= read -r fn; do
            [ -z "$fn" ] && continue
            # A function whose directory no longer exists was DELETED in this
            # push — skip it (it can't be deployed, and delete is done out-of-band
            # via `supabase functions delete`).
            if [ ! -d "supabase/functions/$fn" ]; then
              echo "Skipping deleted function: $fn"
              continue
            fi
            echo "::group::Deploying $fn"
            supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF"
            echo "::endgroup::"
          done <<< "${{ steps.changes.outputs.functions }}"
