name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Only rebuild the frontend when something that actually affects the build
      # changed. Edge-function-only / docs-only pushes skip it entirely — this
      # avoids the heavy, multi-minute image rebuild (and the outage risk if it
      # fails) on every unrelated push.
      - name: Detect frontend changes
        id: changes
        run: |
          base="${{ github.event.before }}"
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            base=$(git rev-parse HEAD^ 2>/dev/null || echo "")
          fi
          if [ -z "$base" ]; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if git diff --name-only "$base" HEAD \
               | grep -qE '^(src/|public/|index\.html|package\.json|package-lock\.json|Dockerfile|nginx\.conf|\.dockerignore|deploy/|vite\.config|tsconfig|tailwind\.config|postcss\.config|components\.json)'; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Frontend changed: $(tail -1 "$GITHUB_OUTPUT")"

      # Build the frontend image HERE (fast GitHub runner), not on the VPS.
      # The small shared VPS can't reliably finish a Vite build, which twice
      # took the app down. We build, ship the image as a tarball, and the VPS
      # only `docker load`s it + restarts the container — zero build on the VPS.
      - name: Build frontend image (in CI)
        if: steps.changes.outputs.frontend == 'true'
        run: |
          docker compose -f deploy/docker-compose.yml build
          # Write into the workspace so the scp-action (which only mounts the
          # workspace, not the runner's /tmp) can see the file.
          docker save leazrapp-frontend:latest | gzip > leazr-frontend.tar.gz
          ls -lh leazr-frontend.tar.gz

      # Ship + load with RETRIES. The VPS (CPU-throttled) intermittently drops
      # inbound connections from the runner, so a single scp/ssh often times
      # out — retrying lands it. Native scp/ssh with generous connect timeouts.
      - name: Ship image to VPS + restart (with retries)
        if: steps.changes.outputs.frontend == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          SSHOPTS="-i $HOME/.ssh/id_deploy -p $VPS_PORT -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=90 -o ServerAliveInterval=15 -o ServerAliveCountMax=8"

          echo "::group::Copy image (retries)"
          copied=false
          for i in 1 2 3 4 5 6; do
            echo "scp attempt $i…"
            if scp $SSHOPTS leazr-frontend.tar.gz "$VPS_USER@$VPS_HOST:/tmp/leazr-frontend.tar.gz"; then copied=true; break; fi
            sleep 25
          done
          echo "::endgroup::"
          $copied || { echo "::error::scp failed after retries"; exit 1; }

          echo "::group::Load + restart (retries)"
          deployed=false
          for i in 1 2 3 4; do
            echo "ssh deploy attempt $i…"
            if ssh $SSHOPTS "$VPS_USER@$VPS_HOST" 'set -e; cd /opt/LeazrApp && git pull origin main && gunzip -c /tmp/leazr-frontend.tar.gz | docker load && docker compose -f deploy/docker-compose.yml up -d --force-recreate --remove-orphans && rm -f /tmp/leazr-frontend.tar.gz && docker image prune -f'; then deployed=true; break; fi
            sleep 25
          done
          echo "::endgroup::"
          $deployed || { echo "::error::deploy failed after retries"; exit 1; }
          rm -f ~/.ssh/id_deploy

  deploy-supabase-functions:
    runs-on: ubuntu-latest
    env:
      SUPABASE_PROJECT_REF: cifbetjefyfocafanlhv
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed functions
        id: changes
        run: |
          base="${{ github.event.before }}"
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            base=$(git rev-parse HEAD^ 2>/dev/null || echo "")
          fi

          if [ -z "$base" ]; then
            echo "No base commit, skipping."
            echo "shared_changed=false" >> "$GITHUB_OUTPUT"
            echo "functions=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          shared_changed=false
          if git diff --name-only "$base" HEAD -- 'supabase/functions/_shared/' | grep -q .; then
            shared_changed=true
          fi

          functions=$(git diff --name-only "$base" HEAD -- 'supabase/functions/' \
            | awk -F/ 'NF>=4 && $3 != "_shared" {print $3}' \
            | sort -u)

          echo "shared_changed=$shared_changed" >> "$GITHUB_OUTPUT"
          {
            echo "functions<<FUNCTIONS_EOF"
            echo "$functions"
            echo "FUNCTIONS_EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Changed functions:"
          echo "$functions"
          echo "_shared changed: $shared_changed"

      - name: Warn if _shared changed
        if: steps.changes.outputs.shared_changed == 'true'
        run: |
          echo "::warning::supabase/functions/_shared changed. Only the functions touched in this push will be redeployed automatically. Redeploy other dependents manually if needed."

      - name: Setup Supabase CLI
        if: steps.changes.outputs.functions != ''
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy changed functions
        if: steps.changes.outputs.functions != ''
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          while IFS= read -r fn; do
            [ -z "$fn" ] && continue
            # A function whose directory no longer exists was DELETED in this
            # push — skip it (it can't be deployed, and delete is done out-of-band
            # via `supabase functions delete`).
            if [ ! -d "supabase/functions/$fn" ]; then
              echo "Skipping deleted function: $fn"
              continue
            fi
            echo "::group::Deploying $fn"
            supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF"
            echo "::endgroup::"
          done <<< "${{ steps.changes.outputs.functions }}"
